version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: launchmate
      POSTGRES_PASSWORD: launchmate
      POSTGRES_DB: launchmate
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U launchmate" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./storage:/app/storage
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://launchmate:launchmate@db:5432/launchmate
      REDIS_URL: redis://redis:6379/0
    command: uvicorn launchmate.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build: ./backend
    volumes:
      - ./backend:/app
      - ./storage:/app/storage
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://launchmate:launchmate@db:5432/launchmate
      REDIS_URL: redis://redis:6379/0
    command: celery -A launchmate.core.celery_app worker --loglevel=info

  celery_beat:
    build: ./backend
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      - redis
      - db
    environment:
      DATABASE_URL: postgresql+asyncpg://launchmate:launchmate@db:5432/launchmate
      REDIS_URL: redis://redis:6379/0
    command: celery -A launchmate.core.celery_app beat --loglevel=info
  # Optional pgAdmin for development (uncomment if needed)
  # pgadmin:
  #   image: dpage/pgadmin4
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: admin@launchmate.com
  #     PGADMIN_DEFAULT_PASSWORD: admin
  #   ports:
  #     - "5050:80"
  #   depends_on:
  #     - db

volumes:
  postgres_data:
